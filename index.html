<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axon Vision AI - المساعد الذكي</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--surface:#15151e;--surface2:#1b1b27;--border:#ffffff0d;--text:#ededf5;--muted:#6b6b82;--accent:#cc785c;--accent2:#e8956d;--green:#4caf82;--red:#e05c5c;}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;background:var(--bg);}
.btn{padding:8px 16px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-family:inherit;transition:0.2s;}
.btn:hover{background:var(--surface2);border-color:var(--accent);}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.messages-wrap{flex:1;overflow-y:auto;padding:20px;}
.msg-row{max-width:800px;margin:0 auto 15px;animation:fadeIn 0.2s ease;}
.msg-row.user{text-align:right;}
.msg-row.user .bubble{background:var(--surface2);display:inline-block;padding:10px 16px;border-radius:18px 18px 4px 18px;max-width:80%;}
.msg-row.ai .bubble{padding:10px 0;}
.bubble p{margin-bottom:8px;}
.bubble pre{background:#0d0d18;border-radius:10px;margin:10px 0;overflow-x:auto;}
.bubble pre code{display:block;padding:12px;}
.input-wrap{padding:10px 20px 20px;}
.input-box{max-width:800px;margin:0 auto;background:var(--surface);border-radius:16px;display:flex;padding:8px;border:1px solid var(--border);}
textarea{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:inherit;padding:10px;resize:none;font-size:15px;}
.send-btn{width:44px;border-radius:10px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:18px;}
.send-btn:disabled{opacity:0.5;cursor:not-allowed;}
.attach-btn{width:44px;border-radius:10px;border:none;background:var(--surface2);color:var(--text);cursor:pointer;font-size:18px;margin-left:5px;}
.image-preview-container{max-width:800px;margin:0 auto 10px;display:none;}
.image-preview{max-width:120px;border-radius:12px;border:1px solid var(--border);}
.remove-img{background:var(--red);color:#fff;border:none;border-radius:6px;padding:4px 8px;margin-top:5px;cursor:pointer;font-size:11px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);backdrop-filter:blur(8px);z-index:100;display:none;align-items:center;justify-content:center;}
.modal{background:var(--surface);border-radius:20px;padding:25px;width:90%;max-width:400px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface2);padding:10px 20px;border-radius:10px;opacity:0;transition:0.2s;z-index:200;font-size:13px;}
.toast.show{opacity:1;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.typing-dots{display:flex;gap:4px;padding:10px 0;}
.typing-dots span{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:typing 1.4s infinite;}
.typing-dots span:nth-child(2){animation-delay:0.2s;}
.typing-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes typing{0%,60%,100%{transform:translateY(0);opacity:0.4;}30%{transform:translateY(-8px);opacity:1;}}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;gap:6px;flex-wrap:wrap">
    <button class="btn" onclick="newChat()">➕ جديد</button>
    <button class="btn" onclick="openModal('models-modal')">🤖 النماذج</button>
    <button class="btn" onclick="shareAsPDF()">📄 PDF</button>
    <button class="btn" onclick="toggleTheme()">🌓</button>
  </div>
  <div>
    <span id="model-badge" style="background:var(--surface2);padding:5px 12px;border-radius:20px;font-size:12px">⚡ Axon Pro</span>
  </div>
</div>

<div class="messages-wrap" id="messages-wrap">
  <div style="text-align:center;padding:60px 20px">
    <div style="font-size:64px;margin-bottom:20px">🔒</div>
    <h2>Axon Vision AI</h2>
    <p style="color:var(--muted);margin-top:10px">مساعد ذكي - آمن بالكامل - يدعم الصور</p>
    <p style="color:var(--accent);font-size:13px;margin-top:15px">✨ ارفع صورة وسأصفها لك بالتفصيل</p>
  </div>
</div>

<div class="input-wrap">
  <div class="image-preview-container" id="image-preview-container">
    <img class="image-preview" id="image-preview">
    <button class="remove-img" onclick="removeImage()">✖ إزالة</button>
  </div>
  <div class="input-box">
    <textarea id="main-input" placeholder="اسأل أي شيء، أو ارفع صورة لتحليلها..." rows="1" onkeydown="if(event.key=='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
    <button class="attach-btn" onclick="document.getElementById('file-input').click()">📎</button>
    <button class="send-btn" id="send-btn" onclick="sendMsg()">📤</button>
  </div>
</div>

<div class="overlay" id="models-modal">
  <div class="modal">
    <h3 style="margin-bottom:20px">🤖 النماذج المتاحة</h3>
    <button class="btn" onclick="selectModel('vision')" style="width:100%;margin-bottom:8px">👁️ Axon Vision (يدعم الصور)</button>
    <button class="btn" onclick="selectModel('pro')" style="width:100%;margin-bottom:8px">⚡ Axon Pro (سريع)</button>
    <button class="btn" onclick="selectModel('flash')" style="width:100%;margin-bottom:8px">🔥 Axon Flash (خفيف)</button>
    <button class="btn" onclick="closeModal('models-modal')" style="width:100%;margin-top:10px">إغلاق</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="file-input" accept="image/*" onchange="handleImage(event)">

<script>
// ============================================
// 🌐 الاتصال بالخادم الآمن (Python Backend)
// ============================================

// استبدل هذا الرابط بعد رفع الخادم على Render
const API_URL = 'https://your-server.onrender.com/api/chat';

let currentModel = 'pro';
let chats = JSON.parse(localStorage.getItem('axon_chats')) || {};
let currentChatId = localStorage.getItem('current_chat') || null;
let isGenerating = false;
let attachedImage = null;

async function sendMsg() {
  if(isGenerating) { toast('يتم التوليد حالياً...'); return; }
  
  const input = document.getElementById('main-input');
  const text = input.value.trim();
  if(!text && !attachedImage) return;
  
  if(!chats[currentChatId]) newChat();
  
  const userMsg = { role: 'user', content: text || 'حلل هذه الصورة' };
  if(attachedImage) userMsg.image = attachedImage;
  chats[currentChatId].messages.push(userMsg);
  
  if(chats[currentChatId].title === 'محادثة جديدة' && text) {
    chats[currentChatId].title = text.slice(0, 30);
  }
  localStorage.setItem('axon_chats', JSON.stringify(chats));
  
  displayMessages();
  input.value = '';
  
  const wrap = document.getElementById('messages-wrap');
  const typingDiv = document.createElement('div');
  typingDiv.className = 'msg-row ai';
  typingDiv.innerHTML = '<div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  wrap.appendChild(typingDiv);
  wrap.scrollTop = wrap.scrollHeight;
  
  document.getElementById('send-btn').disabled = true;
  isGenerating = true;
  
  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        image: attachedImage,
        model: attachedImage ? 'vision' : currentModel
      })
    });
    
    const data = await response.json();
    typingDiv.remove();
    
    if(data.success) {
      chats[currentChatId].messages.push({ role: 'assistant', content: data.content });
      localStorage.setItem('axon_chats', JSON.stringify(chats));
      displayMessages();
    } else {
      throw new Error(data.error);
    }
  } catch(err) {
    typingDiv.innerHTML = `<div class="bubble" style="color:var(--red)">❌ خطأ: ${err.message}</div>`;
    setTimeout(() => typingDiv.remove(), 3000);
  } finally {
    isGenerating = false;
    document.getElementById('send-btn').disabled = false;
    removeImage();
  }
}

function selectModel(model) {
  currentModel = model;
  const names = { vision: '👁️ Axon Vision', pro: '⚡ Axon Pro', flash: '🔥 Axon Flash' };
  document.getElementById('model-badge').innerHTML = names[model];
  closeModal('models-modal');
  toast(`✅ تم التبديل إلى ${names[model]}`);
}

function displayMessages() {
  const wrap = document.getElementById('messages-wrap');
  if(!currentChatId || !chats[currentChatId] || !chats[currentChatId].messages.length) {
    wrap.innerHTML = `<div style="text-align:center;padding:60px 20px">
      <div style="font-size:64px;margin-bottom:20px">🔒</div>
      <h2>Axon Vision AI</h2>
      <p style="color:var(--muted);margin-top:10px">مساعد ذكي - آمن بالكامل - يدعم الصور</p>
    </div>`;
    return;
  }
  
  wrap.innerHTML = chats[currentChatId].messages.map(msg => `
    <div class="msg-row ${msg.role}">
      <div class="bubble">
        ${msg.image ? `<img src="${msg.image}" style="max-width:150px;border-radius:12px;margin-bottom:8px;display:block">` : ''}
        ${formatText(msg.content)}
      </div>
    </div>
  `).join('');
  
  hljs.highlightAll();
  wrap.scrollTop = wrap.scrollHeight;
}

function formatText(text) {
  if(!text) return '';
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => 
      `<pre><code class="language-${lang || 'plaintext'}">${code.trim()}</code></pre>`)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function newChat() {
  const id = 'chat_' + Date.now();
  chats[id] = { title: 'محادثة جديدة', messages: [], created: Date.now() };
  currentChatId = id;
  localStorage.setItem('current_chat', id);
  localStorage.setItem('axon_chats', JSON.stringify(chats));
  displayMessages();
}

function handleImage(event) {
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    attachedImage = e.target.result;
    document.getElementById('image-preview').src = attachedImage;
    document.getElementById('image-preview-container').style.display = 'block';
    toast('✅ تم رفع الصورة');
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function removeImage() {
  attachedImage = null;
  document.getElementById('image-preview-container').style.display = 'none';
}

async function shareAsPDF() {
  if(!currentChatId || !chats[currentChatId] || !chats[currentChatId].messages.length) {
    toast('لا توجد محادثة');
    return;
  }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.text('Axon AI Chat', 20, 20);
  let y = 35;
  for(const msg of chats[currentChatId].messages) {
    if(y > 270) { doc.addPage(); y = 20; }
    doc.text(`${msg.role === 'user' ? '👤' : '🤖'}: ${msg.content.slice(0, 150)}`, 20, y);
    y += 15;
  }
  doc.save(`axon-${Date.now()}.pdf`);
  toast('📄 تم حفظ PDF');
}

function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  document.documentElement.setAttribute('data-theme', cur === 'light' ? '' : 'light');
}

function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

if(!currentChatId || !chats[currentChatId]) newChat();
else displayMessages();
</script>
</body>
</html>
