<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https://image.pollinations.ai; connect-src https://api.groq.com; frame-ancestors 'none';">
<title>Axon AI 🔒</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14;
    --surface: #0d1220;
    --surface2: #111827;
    --border: rgba(99,210,255,0.12);
    --accent: #3de8b0;
    --accent2: #63d2ff;
    --accent3: #a78bfa;
    --text: #e8f4ff;
    --muted: #6b7fa3;
    --danger: #ff6b6b;
    --glow: 0 0 30px rgba(61,232,176,0.15);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── ANIMATED BG ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 80% 10%, rgba(99,210,255,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 10% 80%, rgba(61,232,176,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(167,139,250,0.04) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
    animation: bgPulse 8s ease-in-out infinite alternate;
  }
  @keyframes bgPulse {
    from { opacity: 0.7; }
    to   { opacity: 1; }
  }

  /* ── HEADER ── */
  header {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    background: rgba(13,18,32,0.9);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
    flex-shrink: 0;
  }

  .logo {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 22px;
    letter-spacing: -0.5px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; box-shadow: var(--glow);
    animation: logoGlow 3s ease-in-out infinite alternate;
  }
  @keyframes logoGlow {
    from { box-shadow: 0 0 15px rgba(61,232,176,0.3); }
    to   { box-shadow: 0 0 30px rgba(99,210,255,0.5); }
  }

  .logo span { background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  .header-badge {
    font-size: 10px; padding: 3px 8px;
    background: rgba(61,232,176,0.1);
    border: 1px solid rgba(61,232,176,0.3);
    border-radius: 20px; color: var(--accent);
    font-family: 'Syne', sans-serif; letter-spacing: 1px;
  }

  /* ── TABS ── */
  .tabs {
    display: flex; gap: 4px;
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
    padding: 4px;
  }
  .tab {
    padding: 7px 14px; border-radius: 9px;
    cursor: pointer; font-size: 13px; font-weight: 500;
    color: var(--muted); transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
    border: none; background: none; font-family: 'Tajawal', sans-serif;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    background: linear-gradient(135deg, rgba(61,232,176,0.15), rgba(99,210,255,0.1));
    color: var(--accent);
    border: 1px solid rgba(61,232,176,0.2);
  }
  .tab-icon { font-size: 15px; }

  /* ── MAIN LAYOUT ── */
  .main {
    position: relative; z-index: 1;
    display: flex; flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 220px; flex-shrink: 0;
    background: rgba(13,18,32,0.7);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 16px 12px; gap: 6px;
    overflow-y: auto;
  }

  .sidebar-section { font-size: 10px; color: var(--muted); letter-spacing: 2px; padding: 10px 8px 4px; text-transform: uppercase; }

  .sidebar-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 10px;
    cursor: pointer; font-size: 13px;
    color: var(--muted); transition: all 0.2s;
    border: 1px solid transparent;
    background: none; width: 100%; text-align: right;
    font-family: 'Tajawal', sans-serif;
  }
  .sidebar-btn:hover { background: rgba(61,232,176,0.05); color: var(--text); border-color: var(--border); }
  .sidebar-btn.active { background: rgba(61,232,176,0.08); color: var(--accent); border-color: rgba(61,232,176,0.2); }
  .sidebar-btn .icon { font-size: 16px; width: 20px; text-align: center; }

  /* ── CONTENT AREA ── */
  .content {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
  }

  /* ── PANEL ── */
  .panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .panel.active { display: flex; }

  /* ── CHAT PANEL ── */
  #chat-panel { padding: 0; }

  .messages {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 16px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    display: flex; gap: 12px; max-width: 85%;
    animation: msgIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes msgIn { from { opacity:0; transform: translateY(10px) scale(0.97); } to { opacity:1; transform: translateY(0) scale(1); } }

  .msg.user { flex-direction: row-reverse; align-self: flex-end; }
  .msg.ai { align-self: flex-start; }

  .msg-avatar {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .msg.ai .msg-avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); box-shadow: var(--glow); }
  .msg.user .msg-avatar { background: rgba(167,139,250,0.2); border: 1px solid rgba(167,139,250,0.3); }

  .msg-content {
    padding: 12px 16px; border-radius: 14px;
    font-size: 14px; line-height: 1.7;
  }
  .msg.ai .msg-content {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-top-right-radius: 4px;
  }
  .msg.user .msg-content {
    background: linear-gradient(135deg, rgba(61,232,176,0.1), rgba(99,210,255,0.08));
    border: 1px solid rgba(61,232,176,0.15);
    border-top-left-radius: 4px;
  }

  .msg-img { max-width: 100%; max-height: 250px; border-radius: 10px; margin-top: 8px; display: block; }

  /* typing indicator */
  .typing { display: flex; gap: 5px; padding: 14px 16px; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    animation: bounce 1s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity:0.4; } 30% { transform: translateY(-6px); opacity:1; } }

  /* ── INPUT AREA ── */
  .input-area {
    padding: 16px 20px;
    background: rgba(13,18,32,0.9);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(20px);
  }

  .input-toolbar {
    display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap;
  }
  .tool-btn {
    padding: 6px 12px; border-radius: 8px; cursor: pointer;
    font-size: 12px; font-family: 'Tajawal', sans-serif;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03); color: var(--muted);
    display: flex; align-items: center; gap: 5px;
    transition: all 0.2s;
  }
  .tool-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(61,232,176,0.05); }
  .tool-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(61,232,176,0.1); }

  .input-row {
    display: flex; gap: 10px; align-items: flex-end;
  }

  #image-preview {
    position: relative; display: none; margin-bottom: 10px;
  }
  #image-preview img { max-height: 120px; border-radius: 10px; border: 1px solid var(--border); }
  #image-preview .remove-img {
    position: absolute; top: -6px; right: -6px;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--danger); color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 12px; border: none;
  }

  #user-input {
    flex: 1; background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px;
    color: var(--text); font-size: 14px;
    font-family: 'Tajawal', sans-serif;
    resize: none; outline: none;
    transition: border-color 0.2s;
    min-height: 48px; max-height: 150px;
    line-height: 1.5;
  }
  #user-input:focus { border-color: rgba(61,232,176,0.4); }
  #user-input::placeholder { color: var(--muted); }

  .send-btn {
    width: 48px; height: 48px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; transition: all 0.2s;
    flex-shrink: 0;
  }
  .send-btn:hover { transform: scale(1.05); box-shadow: var(--glow); }
  .send-btn:active { transform: scale(0.97); }

  /* ── IMAGE GEN PANEL ── */
  #imggen-panel { padding: 20px; gap: 16px; }

  .panel-title {
    font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }
  .panel-subtitle { color: var(--muted); font-size: 13px; }

  .gen-controls { display: flex; gap: 10px; }

  #gen-prompt {
    flex: 1; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 16px; color: var(--text); font-size: 14px;
    font-family: 'Tajawal', sans-serif; outline: none;
    transition: border-color 0.2s;
  }
  #gen-prompt:focus { border-color: rgba(61,232,176,0.4); }
  #gen-prompt::placeholder { color: var(--muted); }

  .gen-btn {
    padding: 12px 24px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; cursor: pointer; color: var(--bg);
    font-weight: 700; font-size: 14px; font-family: 'Tajawal', sans-serif;
    transition: all 0.2s; white-space: nowrap;
  }
  .gen-btn:hover { transform: translateY(-1px); box-shadow: var(--glow); }

  .style-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .style-chip {
    padding: 6px 14px; border-radius: 20px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    color: var(--muted); font-size: 12px; cursor: pointer;
    transition: all 0.2s;
  }
  .style-chip:hover, .style-chip.active {
    border-color: var(--accent); color: var(--accent);
    background: rgba(61,232,176,0.08);
  }

  .gen-output {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden; position: relative;
    min-height: 300px;
  }
  .gen-placeholder {
    text-align: center; color: var(--muted);
  }
  .gen-placeholder .big-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
  .gen-placeholder p { font-size: 14px; }

  #gen-result { max-width: 100%; max-height: 100%; border-radius: 16px; display: none; }

  .gen-loading {
    display: none; flex-direction: column; align-items: center; gap: 16px;
    color: var(--muted); font-size: 14px;
  }
  .gen-spinner {
    width: 48px; height: 48px; border-radius: 50%;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── VISION PANEL ── */
  #vision-panel { padding: 20px; gap: 16px; }

  .upload-zone {
    border: 2px dashed var(--border); border-radius: 16px;
    padding: 40px; text-align: center; cursor: pointer;
    transition: all 0.3s; color: var(--muted);
  }
  .upload-zone:hover { border-color: var(--accent); background: rgba(61,232,176,0.03); }
  .upload-zone .big-icon { font-size: 40px; margin-bottom: 12px; }
  .upload-zone p { font-size: 14px; }
  .upload-zone input { display: none; }

  #vision-preview { display: none; position: relative; }
  #vision-img { width: 100%; max-height: 300px; object-fit: contain; border-radius: 12px; border: 1px solid var(--border); }

  .vision-controls { display: flex; gap: 10px; }
  #vision-question {
    flex: 1; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 16px; color: var(--text); font-size: 14px;
    font-family: 'Tajawal', sans-serif; outline: none;
  }
  #vision-question:focus { border-color: rgba(61,232,176,0.4); }

  .vision-result {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; font-size: 14px;
    line-height: 1.8; display: none; flex: 1; overflow-y: auto;
  }

  /* ── CODE PANEL ── */
  #code-panel { padding: 20px; gap: 16px; }

  .code-input-row { display: flex; gap: 10px; }
  #code-problem {
    flex: 1; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 16px; color: var(--text); font-size: 14px;
    font-family: 'Tajawal', sans-serif; resize: none;
    height: 80px; outline: none;
  }
  #code-problem:focus { border-color: rgba(61,232,176,0.4); }

  .lang-select {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 0 16px; color: var(--text);
    font-family: 'Tajawal', sans-serif; font-size: 13px; outline: none;
    cursor: pointer; min-width: 120px;
  }

  .code-output {
    flex: 1; background: #060a12; border: 1px solid var(--border);
    border-radius: 12px; overflow: auto; position: relative;
  }
  .code-output pre {
    padding: 20px; font-size: 13px; line-height: 1.7;
    font-family: 'Fira Code', 'Courier New', monospace;
    color: #a8d8a8; white-space: pre-wrap; word-break: break-word;
  }
  .code-output .placeholder-msg {
    position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center;
    color: var(--muted); font-size: 14px; text-align: center;
    flex-direction: column; gap: 8px;
  }
  .copy-code {
    position: absolute; top: 12px; left: 12px;
    padding: 6px 12px; border-radius: 8px;
    background: rgba(61,232,176,0.1); border: 1px solid rgba(61,232,176,0.2);
    color: var(--accent); font-size: 12px; cursor: pointer;
    transition: all 0.2s; display: none;
    font-family: 'Tajawal', sans-serif;
  }
  .copy-code:hover { background: rgba(61,232,176,0.2); }

  /* ── LOGO PANEL ── */
  #logo-panel { padding: 20px; gap: 16px; }

  .logo-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .ctrl-group { display: flex; flex-direction: column; gap: 6px; }
  .ctrl-label { font-size: 12px; color: var(--muted); }
  .ctrl-input {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; color: var(--text);
    font-size: 13px; font-family: 'Tajawal', sans-serif; outline: none;
  }
  .ctrl-input:focus { border-color: rgba(61,232,176,0.4); }

  .logo-canvas-wrap {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 16px; display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  #logo-canvas {
    max-width: 100%; max-height: 100%;
    border-radius: 12px;
  }
  .logo-placeholder {
    text-align: center; color: var(--muted); font-size: 14px;
  }
  .logo-placeholder .big-icon { font-size: 40px; margin-bottom: 10px; opacity:0.4; }

  /* ── WELCOME ── */
  .welcome-msg {
    display: flex; align-items: flex-start; gap: 12px;
    max-width: 75%; align-self: flex-start;
  }
  .welcome-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 16px; border-top-right-radius: 4px;
    padding: 16px 20px;
  }
  .welcome-name { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
  .welcome-text { font-size: 13.5px; line-height: 1.8; color: var(--text); margin-bottom: 12px; }
  .quick-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .quick-btn {
    padding: 6px 12px; border-radius: 8px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    color: var(--muted); font-size: 12px; cursor: pointer;
    transition: all 0.2s; font-family: 'Tajawal', sans-serif;
  }
  .quick-btn:hover { border-color: var(--accent2); color: var(--accent2); background: rgba(99,210,255,0.06); }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── file input hidden ── */
  #file-input { display: none; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="logo">
      <div class="logo-icon">⬡</div>
      <span>Axon</span>
    </div>
    <div class="header-badge">AI POWERED</div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('chat')" id="tab-chat">
      <span class="tab-icon">💬</span> محادثة
    </button>
    <button class="tab" onclick="switchTab('vision')" id="tab-vision">
      <span class="tab-icon">👁️</span> تحليل صور
    </button>
    <button class="tab" onclick="switchTab('imggen')" id="tab-imggen">
      <span class="tab-icon">🎨</span> توليد صور
    </button>
    <button class="tab" onclick="switchTab('code')" id="tab-code">
      <span class="tab-icon">💻</span> كود
    </button>
    <button class="tab" onclick="switchTab('logo')" id="tab-logo">
      <span class="tab-icon">✦</span> لوجو
    </button>
  </div>

  <div style="display:flex;gap:12px;align-items:center;"><span id="rate-indicator" style="font-size:11px;color:var(--accent);font-family:monospace;">⬡ 15/15</span><div style="font-size:12px;color:var(--muted);">يوسف بدران</div></div>
</header>

<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">الأدوات</div>
    <button class="sidebar-btn active" onclick="insertQuick('اشرح لي الذكاء الاصطناعي')">
      <span class="icon">🧠</span> ذكاء اصطناعي
    </button>
    <button class="sidebar-btn" onclick="insertQuick('ساعدني في حل مشكلة الهاردوير')">
      <span class="icon">🔧</span> هاردوير
    </button>
    <button class="sidebar-btn" onclick="insertQuick('ساعدني في البرمجة')">
      <span class="icon">💻</span> برمجة
    </button>
    <button class="sidebar-btn" onclick="insertQuick('صمم لي واجهة برنامج')">
      <span class="icon">🎨</span> تصميم
    </button>
    <button class="sidebar-btn" onclick="insertQuick('حل هذه المعادلة الرياضية')">
      <span class="icon">📐</span> رياضيات
    </button>
    <div class="sidebar-section">إعدادات</div>
    <button class="sidebar-btn" onclick="clearChat()">
      <span class="icon">🗑️</span> مسح المحادثة
    </button>
    <button class="sidebar-btn" onclick="exportChat()">
      <span class="icon">💾</span> تصدير
    </button>
    <div style="margin-top:auto;padding-top:16px;">
      <div style="font-size:11px;color:var(--muted);text-align:center;padding:8px;border:1px solid var(--border);border-radius:8px;line-height:1.6;">
        <strong style="color:var(--accent);">Axon AI</strong><br>
        مدعوم بـ Groq<br>
        <span style="color:rgba(255,255,255,0.3);">llama-3.3-70b</span>
      </div>
    </di
