<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axon AI Pro - مساعد ذكي شامل</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;
  --sidebar:#0d0d14;
  --surface:#15151e;
  --surface2:#1b1b27;
  --border:#ffffff0d;
  --border2:#ffffff16;
  --text:#ededf5;
  --muted:#6b6b82;
  --accent:#cc785c;
  --accent2:#e8956d;
  --green:#4caf82;
  --blue:#5b8def;
  --red:#e05c5c;
  --r:12px;
}
[data-theme="light"]{
  --bg:#f5f5f0;
  --sidebar:#eeeee8;
  --surface:#ffffff;
  --surface2:#f0f0ea;
  --border:#00000010;
  --text:#1a1a2e;
  --muted:#888898;
}
html,body{height:100%;overflow:hidden}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--text);display:flex}
.sidebar{
  width:260px;flex-shrink:0;background:var(--sidebar);
  border-left:1px solid var(--border);display:flex;
  flex-direction:column;height:100vh;overflow:hidden;
}
.sidebar-top{padding:14px 10px 8px;flex-shrink:0}
.new-chat-btn{
  width:100%;padding:10px 14px;background:var(--surface2);
  border:1px solid var(--border2);border-radius:var(--r);
  color:var(--text);font-size:14px;cursor:pointer;
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
}
.search-bar{
  padding:7px 12px;background:var(--surface);border:1px solid var(--border2);
  border-radius:9px;color:var(--text);font-size:13px;
  font-family:inherit;outline:none;width:100%;
}
.chat-list{flex:1;overflow-y:auto;padding:0 6px 8px}
.chat-item{
  padding:9px 10px;border-radius:9px;cursor:pointer;
  font-size:13px;color:var(--muted);display:flex;
  align-items:center;gap:8px;margin-bottom:1px;
}
.chat-item:hover,.chat-item.active{background:var(--surface);color:var(--text)}
.chat-item-title{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{
  padding:12px 20px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--border);
}
.model-btn{
  padding:7px 12px;border-radius:9px;border:1px solid var(--border2);
  background:transparent;color:var(--text);font-family:inherit;
  cursor:pointer;display:flex;align-items:center;gap:7px;
}
.messages-wrap{flex:1;overflow-y:auto;padding:28px 0 8px}
.msg-row{max-width:800px;margin:0 auto;padding:5px 24px}
.msg-row.user .bubble{
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:18px 18px 4px 18px;padding:12px 16px;
  max-width:78%;margin-right:auto;
}
.msg-row.ai .bubble{font-size:15px;line-height:1.75}
.bubble p{margin-bottom:10px}
.bubble pre{background:#0d0d18;border-radius:10px;margin:12px 0;overflow-x:auto}
.bubble pre code{display:block;padding:14px 16px}
.input-wrap{padding:10px 20px 18px;flex-shrink:0}
.input-box{
  max-width:800px;margin:0 auto;background:var(--surface);
  border:1px solid var(--border2);border-radius:16px;
}
.input-main{display:flex;align-items:flex-end}
textarea#main-input{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-family:inherit;font-size:15px;
  padding:13px 16px;min-height:50px;resize:none;
}
.send-btn{
  width:32px;height:32px;border-radius:8px;border:none;
  cursor:pointer;background:var(--accent);color:#fff;
  margin:8px;
}
.send-btn:disabled{background:var(--surface2);cursor:not-allowed}
.stop-btn{
  width:32px;height:32px;border-radius:8px;border:none;
  cursor:pointer;background:var(--red);color:#fff;
  margin:8px;display:none;
}
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.8);
  backdrop-filter:blur(6px);z-index:100;
  display:none;align-items:center;justify-content:center;
}
.modal{
  background:var(--surface);border-radius:18px;padding:26px;
  width:90%;max-width:480px;
}
.modal-head{display:flex;justify-content:space-between;margin-bottom:20px}
.field{margin-bottom:14px}
.field input,.field textarea,.field select{
  width:100%;background:var(--surface2);
  border:1px solid var(--border2);border-radius:10px;
  padding:10px 13px;color:var(--text);
}
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--surface2);border-radius:10px;
  padding:10px 18px;opacity:0;transition:.25s;z-index:200;
}
.toast.show{opacity:1}
.plan-badge{
  position:absolute;top:10px;right:10px;
  padding:4px 12px;border-radius:20px;
  font-size:11px;font-weight:bold;
}
.free{background:var(--green);color:#fff}
.premium{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-top">
    <button class="new-chat-btn" onclick="newChat()">+ محادثة جديدة</button>
    <input class="search-bar" id="search-bar" placeholder="🔍 بحث في المحادثات..." oninput="filterChats(this.value)">
  </div>
  <div class="chat-list" id="chat-list"></div>
</div>

<div class="main">
  <div class="topbar">
    <button class="model-btn" onclick="toggleModelMenu()">
      <span id="model-label">🤖 Axon Pro</span>
    </button>
    <div style="display:flex;gap:8px">
      <button class="model-btn" onclick="speakLastReply()">🔊 نطق</button>
      <button class="model-btn" onclick="shareAsPDF()">📄 PDF</button>
      <button class="model-btn" onclick="openModal('settings-modal')">⚙️</button>
      <button class="model-btn" onclick="toggleTheme()">🌓</button>
    </div>
  </div>

  <div class="messages-wrap" id="messages-wrap">
    <div style="text-align:center;padding:60px 20px">
      <div style="font-size:48px;margin-bottom:20px">🚀</div>
      <h2>مرحباً بك في Axon AI</h2>
      <p style="color:var(--muted);margin-top:10px">مساعد ذكي متعدد النماذج مع دعم الصور والصوت</p>
    </div>
  </div>

  <div class="input-wrap">
    <div class="input-box">
      <div class="input-main">
        <textarea id="main-input" placeholder="اسألني أي شيء..." rows="1" onkeydown="if(event.key=='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMsg()">📤</button>
        <button class="stop-btn" id="stop-btn" onclick="stopGeneration()">⏹️</button>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="settings-modal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">⚙️ الإعدادات</div>
      <button onclick="closeModal('settings-modal')" style="background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer">×</button>
    </div>
    <div class="field">
      <label>نوع الحساب</label>
      <select id="plan-type" onchange="togglePlanFeatures()">
        <option value="free">🎁 مجاني (محدود)</option>
        <option value="premium">💎 بريميوم (غير محدود)</option>
      </select>
    </div>
    <div class="field">
      <label>مفتاح API (بريميوم فقط)</label>
      <input type="password" id="api-key" placeholder="gsk_... أو sk-... أو hf_...">
    </div>
    <div class="field">
      <label>النموذج</label>
      <select id="model-select">
        <option value="groq">Groq (Llama 3.3 70B)</option>
        <option value="openai">OpenAI (GPT-3.5/4)</option>
        <option value="huggingface">Hugging Face (Free)</option>
      </select>
    </div>
    <div class="field">
      <label>System Prompt</label>
      <textarea id="system-prompt" rows="3">أنت مساعد ذكي محترف، تتحدث العربية بطلاقة، تساعد في البرمجة والتقنية والعلوم.</textarea>
    </div>
    <button class="new-chat-btn" onclick="saveSettings()" style="margin-top:10px">💾 حفظ</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ================ نظام الحماية والتشفير ================
const SECRET_KEY = "Axon2024SecureKey";
let currentAbortController = null;
let currentStreaming = false;

// تخزين مشفر للمفتاح
function encryptData(data) {
  return btoa(encodeURIComponent(data));
}

function decryptData(data) {
  try {
    return decodeURIComponent(atob(data));
  } catch(e) { return null; }
}

// ================ نظام المستخدمين والميزات ================
let userPlan = localStorage.getItem('axon_plan') || 'free';
let apiKeys = {
  groq: '',
  openai: '',
  huggingface: ''
};

function togglePlanFeatures() {
  const plan = document.getElementById('plan-type').value;
  userPlan = plan;
  localStorage.setItem('axon_plan', plan);
  
  if(plan === 'free') {
    document.getElementById('api-key').disabled = true;
    document.getElementById('api-key').placeholder = 'الميزات المجانية لا تحتاج مفتاح';
    toast('✅ الوضع المجاني: 10 رسائل يومياً، نموذج Hugging Face فقط');
  } else {
    document.getElementById('api-key').disabled = false;
    document.getElementById('api-key').placeholder = 'أدخل مفتاح API الخاص بك';
  }
}

// عداد الرسائل المجانية
let freeMessagesCount = parseInt(localStorage.getItem('free_msgs') || '0');
let lastResetDate = localStorage.getItem('last_reset');

function checkFreeLimit() {
  const today = new Date().toDateString();
  if(lastResetDate !== today) {
    freeMessagesCount = 0;
    localStorage.setItem('last_reset', today);
  }
  
  if(userPlan === 'free' && freeMessagesCount >= 10) {
    toast('⚠️ لقد وصلت للحد الأقصى (10 رسائل). قم بالترقية للمزيد!');
    return false;
  }
  return true;
}

function incrementFreeCounter() {
  if(userPlan === 'free') {
    freeMessagesCount++;
    localStorage.setItem('free_msgs', freeMessagesCount);
    toast(`📊 تبقى ${10 - freeMessagesCount} رسالة اليوم`);
  }
}

// ================ إدارة المحادثات ================
let chats = JSON.parse(localStorage.getItem('axon_chats_pro')) || {};
let currentChatId = localStorage.getItem('current_chat') || null;
let currentModel = 'groq';
let isGenerating = false;

function loadChats() {
  const ids = Object.keys(chats).reverse();
  const list = document.getElementById('chat-list');
  if(!list) return;
  
  list.innerHTML = ids.map(id => {
    const chat = chats[id];
    return `
      <div class="chat-item ${currentChatId === id ? 'active' : ''}" onclick="switchChat('${id}')">
        <span>💬</span>
        <span class="chat-item-title">${chat.title || 'محادثة جديدة'}</span>
        <button onclick="event.stopPropagation();deleteChat('${id}')" style="background:none;border:none;color:var(--muted);cursor:pointer">🗑️</button>
      </div>
    `;
  }).join('');
}

function newChat() {
  const id = 'chat_' + Date.now();
  chats[id] = { title: 'محادثة جديدة', messages: [], created: Date.now() };
  currentChatId = id;
  localStorage.setItem('current_chat', id);
  localStorage.setItem('axon_chats_pro', JSON.stringify(chats));
  loadChats();
  clearMessagesDisplay();
}

function switchChat(id) {
  currentChatId = id;
  localStorage.setItem('current_chat', id);
  loadChats();
  displayChatMessages();
}

function deleteChat(id) {
  delete chats[id];
  if(currentChatId === id) {
    const ids = Object.keys(chats);
    currentChatId = ids.length ? ids[0] : null;
  }
  localStorage.setItem('axon_chats_pro', JSON.stringify(chats));
  loadChats();
  if(currentChatId) displayChatMessages();
  else newChat();
}

function filterChats(query) {
  const items = document.querySelectorAll('.chat-item');
  items.forEach(item => {
    const title = item.querySelector('.chat-item-title').textContent;
    item.style.display = title.includes(query) ? '' : 'none';
  });
}

function displayChatMessages() {
  const wrap = document.getElementById('messages-wrap');
  if(!currentChatId || !chats[currentChatId]) {
    wrap.innerHTML = '<div style="text-align:center;padding:60px"><h2>✨ مرحباً</h2><p>ابدأ محادثة جديدة</p></div>';
    return;
  }
  
  const messages = chats[currentChatId].messages || [];
  if(messages.length === 0) {
    wrap.innerHTML = '<div style="text-align:center;padding:60px"><h2>🚀 Axon AI</h2><p>اسألني أي شيء!</p></div>';
    return;
  }
  
  wrap.innerHTML = messages.map(msg => `
    <div class="msg-row ${msg.role}">
      <div class="bubble">${formatMarkdown(msg.content)}</div>
    </div>
  `).join('');
  
  hljs.highlightAll();
  setTimeout(() => wrap.scrollTop = wrap.scrollHeight, 100);
}

function clearMessagesDisplay() {
  document.getElementById('messages-wrap').innerHTML = '<div style="text-align:center;padding:60px"><h2>✨ محادثة جديدة</h2><p>اكتب سؤالك...</p></div>';
}

// ================ Markdown Formatter ================
function formatMarkdown(text) {
  let html = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => 
      `<pre><code class="language-${lang || 'plaintext'}">${code.trim()}</code></pre>`)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
  return `<p>${html}</p>`;
}

// ================ AI Models API ================
async function sendMsg() {
  if(isGenerating) {
    toast('يتم التوليد حالياً... انتظر قليلاً');
    return;
  }
  
  if(!checkFreeLimit()) return;
  
  const input = document.getElementById('main-input');
  const text = input.value.trim();
  if(!text) return;
  
  // حفظ رسالة المستخدم
  if(!chats[currentChatId]) newChat();
  chats[currentChatId].messages.push({ role: 'user', content: text });
  if(chats[currentChatId].title === 'محادثة جديدة') {
    chats[currentChatId].title = text.slice(0, 30);
  }
  localStorage.setItem('axon_chats_pro', JSON.stringify(chats));
  
  // عرض الرسالة
  displayChatMessages();
  input.value = '';
  
  // إضافة مؤشر الكتابة
  const wrap = document.getElementById('messages-wrap');
  const typingDiv = document.createElement('div');
  typingDiv.className = 'msg-row ai';
  typingDiv.innerHTML = '<div class="bubble"><em>✍️ جاري التفكير...</em></div>';
  wrap.appendChild(typingDiv);
  wrap.scrollTop = wrap.scrollHeight;
  
  // إظهار زر الإيقاف
  document.getElementById('send-btn').style.display = 'none';
  document.getElementById('stop-btn').style.display = 'flex';
  isGenerating = true;
  
  currentAbortController = new AbortController();
  
  try {
    let response;
    const modelType = document.getElementById('model-select')?.value || 'groq';
    currentModel = modelType;
    
    if(userPlan === 'free' || modelType === 'huggingface') {
      response = await callHuggingFace(text, currentAbortController.signal);
    } else if(modelType === 'groq') {
      response = await callGroq(text, currentAbortController.signal);
    } else if(modelType === 'openai') {
      response = await callOpenAI(text, currentAbortController.signal);
    }
    
    typingDiv.remove();
    
    // حفظ الرد
    chats[currentChatId].messages.push({ role: 'assistant', content: response });
    localStorage.setItem('axon_chats_pro', JSON.stringify(chats));
    displayChatMessages();
    incrementFreeCounter();
    
  } catch(err) {
    if(err.name === 'AbortError') {
      toast('⏹️ تم إيقاف التوليد');
    } else {
      typingDiv.innerHTML = `<div class="bubble" style="color:var(--red)">❌ خطأ: ${err.message}</div>`;
      setTimeout(() => typingDiv.remove(), 3000);
    }
  } finally {
    isGenerating = false;
    document.getElementById('send-btn').style.display = 'flex';
    document.getElementById('stop-btn').style.display = 'none';
    currentAbortController = null;
  }
}

function stopGeneration() {
  if(currentAbortController) {
    currentAbortController.abort();
  }
}

// Hugging Face (مجاني)
async function callHuggingFace(text, signal) {
  const response = await fetch('https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ inputs: text, parameters: { max_new_tokens: 1000 } }),
    signal
  });
  
  if(!response.ok) throw new Error('Hugging Face API error');
  const data = await response.json();
  return data[0]?.generated_text || data.generated_text || 'عذراً، لم أتمكن من التوليد';
}

// Groq API
async function callGroq(text, signal) {
  let apiKey = document.getElementById('api-key')?.value;
  if(userPlan === 'premium' && !apiKey) {
    throw new Error('الرجاء إدخال مفتاح Groq API');
  }
  
  if(!apiKey && userPlan === 'free') {
    // تجريبي بدون مفتاح - استخدم خدمة تجريبية
    return await callHuggingFace(text, signal);
  }
  
  const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${apiKey}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      messages: [{ role: 'user', content: text }],
      temperature: 0.7,
      max_tokens: 2000
    }),
    signal
  });
  
  if(!response.ok) throw new Error('Groq API error');
  const data = await response.json();
  return data.choices[0].message.content;
}

// OpenAI API
async function callOpenAI(text, signal) {
  let apiKey = document.getElementById('api-key')?.value;
  if(!apiKey) throw new Error('الرجاء إدخال مفتاح OpenAI API');
  
  const response = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${apiKey}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      model: 'gpt-3.5-turbo',
      messages: [{ role: 'user', content: text }],
      temperature: 0.7
    }),
    signal
  });
  
  if(!response.ok) throw new Error('OpenAI API error');
  const data = await response.json();
  return data.choices[0].message.content;
}

// ================ Text-to-Speech ================
function speakLastReply() {
  if(!currentChatId || !chats[currentChatId]) return;
  const messages = chats[currentChatId].messages;
  const lastAI = [...messages].reverse().find(m => m.role === 'assistant');
  if(lastAI && lastAI.content) {
    const utterance = new SpeechSynthesisUtterance(lastAI.content);
    utterance.lang = 'ar-SA';
    utterance.rate = 0.9;
    speechSynthesis.speak(utterance);
    toast('🔊 جاري نطق الرد');
  } else {
    toast('لا يوجد رد للنطق');
  }
}

// ================ PDF Sharing ================
async function shareAsPDF() {
  if(!currentChatId || !chats[currentChatId]) {
    toast('لا توجد محادثة للمشاركة');
    return;
  }
  
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const messages = chats[currentChatId].messages;
  
  let y = 20;
  doc.setFont("helvetica");
  doc.setFontSize(16);
  doc.text(`Axon AI Chat - ${new Date().toLocaleString()}`, 20, y);
  y += 15;
  
  for(const msg of messages) {
    if(y > 270) {
      doc.addPage();
      y = 20;
    }
    doc.setFontSize(12);
    doc.setTextColor(msg.role === 'user' ? 100 : 200, 100, 255);
    doc.text(`${msg.role === 'user' ? '👤 أنت' : '🤖 Axon'}:`, 20, y);
    y += 7;
    doc.setTextColor(0, 0, 0);
    const lines = doc.splitTextToSize(msg.content.slice(0, 500), 170);
    doc.text(lines, 20, y);
    y += (lines.length * 7) + 10;
  }
  
  doc.save(`axon-chat-${Date.now()}.pdf`);
  toast('📄 تم حفظ المحادثة كـ PDF');
}

// ================ Nano Banana Image Generation ================
async function generateImage() {
  const prompt = prompt('أدخل وصف الصورة:');
  if(!prompt) return;
  
  toast('🎨 جاري توليد الصورة...');
  const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=1024&height=768`;
  
  const imgWindow = window.open();
  imgWindow.document.write(`<html><body style="text-align:center"><img src="${imageUrl}" style="max-width:100%"><br><button onclick="window.close()">إغلاق</button></body></html>`);
  toast('✅ تم توليد الصورة');
}

// ================ Settings & Security ================
function saveSettings() {
  const plan = document.getElementById('plan-type').value;
  userPlan = plan;
  localStorage.setItem('axon_plan', plan);
  
  const apiKey = document.getElementById('api-key').value;
  if(apiKey) {
    localStorage.setItem('axon_api_encrypted', encryptData(apiKey));
  }
  
  const systemPrompt = document.getElementById('system-prompt').value;
  localStorage.setItem('axon_system', encryptData(systemPrompt));
  
  toast('✅ تم حفظ الإعدادات');
  closeModal('settings-modal');
  togglePlanFeatures();
}

function loadSettings() {
  const savedPlan = localStorage.getItem('axon_plan');
  if(savedPlan) {
    userPlan = savedPlan;
    document.getElementById('plan-type').value = savedPlan;
  }
  
  const encryptedKey = localStorage.getItem('axon_api_encrypted');
  if(encryptedKey) {
    const key = decryptData(encryptedKey);
    if(key) document.getElementById('api-key').value = key;
  }
  
  const encryptedSys = localStorage.getItem('axon_system');
  if(encryptedSys) {
    const sys = decryptData(encryptedSys);
    if(sys) document.getElementById('system-prompt').value = sys;
  }
  
  togglePlanFeatures();
}

function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  document.documentElement.setAttribute('data-theme', cur === 'light' ? '' : 'light');
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function toggleModelMenu() {
  // تبسيط - يمكن إضافة قائمة منسدلة
  toast(`النموذج الحالي: ${currentModel}`);
}

// ================ Initialization ================
loadSettings();
if(!currentChatId || !chats[currentChatId]) newChat();
else displayChatMessages();
loadChats();
